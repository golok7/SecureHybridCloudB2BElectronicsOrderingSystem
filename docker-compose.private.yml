version: '3.8'

services:

  payment-service:
    build: ./private-cloud/payment-service
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}

  inventory-service:
    build: ./private-cloud/inventory-service
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}

  order-service:
    build: ./private-cloud/order-service
    environment:
      - RABBITMQ_URL=amqp://admin:admin123@10.102.223.132:5672
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}
      - PAYMENT_SERVICE_URL=http://localhost:4000
      - INVENTORY_SERVICE_URL=http://localhost:4001