services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cert.pem:/etc/nginx/cert.pem:ro
      - ./key.pem:/etc/nginx/key.pem:ro
    depends_on:
      - public-api
    networks:
      - cloud_network

  public-api:
    build: ./public-cloud
    environment:
      - PORT=3000
      - RABBITMQ_URL=amqp://rabbitmq
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - rabbitmq
    networks:
      - cloud_network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
    networks:
      - cloud_network
      - private_network

  order-service:
    build: ./private-cloud/order-service
    environment:
      - RABBITMQ_URL=amqp://rabbitmq
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}
      - PAYMENT_SERVICE_URL=http://payment-service:4000
      - INVENTORY_SERVICE_URL=http://inventory-service:4001
    depends_on:
      - rabbitmq
      - payment-service
      - inventory-service
    networks:
      - private_network
      - cloud_network

  payment-service:
    build: ./private-cloud/payment-service
    environment:
      - PORT=4000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}
    networks:
      - private_network
      - cloud_network

  inventory-service:
    build: ./private-cloud/inventory-service
    environment:
      - PORT=4001
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}
    networks:
      - private_network
      - cloud_network

networks:
  cloud_network:
    driver: bridge
  private_network:
    driver: bridge
    internal: true